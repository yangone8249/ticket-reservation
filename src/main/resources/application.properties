spring.application.name=ticket-reservation

spring.datasource.url=jdbc:mysql://localhost:3306/ticket_reservation
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# DML 파라미터 바인딩 값까지 콘솔에 출력
logging.level.org.hibernate.orm.jdbc.bind=TRACE
# 비즈니스 로직 흐름 로그(필요시 디버그 레벨로)
logging.level.com.yang.ticket_reservation=DEBUG

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.datasource.hikari.maximum-pool-size=50

spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp


logging.level.org.springframework.web=DEBUG