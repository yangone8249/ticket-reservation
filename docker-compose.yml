services:
  mysql:
    image: mysql:9.7.1
    container_name: mysql-server
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ticket_reservation
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:8.8.0
    container_name: redis-server
    ports:
      - "6379:6379"

volumes:
  mysql-data:
